# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "604de7161f79ed2b785dcfd31c5fcebe"
name = "waterdrop-app-dev"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders: 数据分析需要(订单/销售/SKU/customerJourneySummary 渠道归因)。
# read_reports: 渠道-Shopify营销报表(CHANNEL_MARKETING)走 shopifyqlQuery 取会话/销售/转化率。
#   注:customerJourneySummary 渠道归因字段 + shopifyqlQuery 均需在 Partner Dashboard 申请
#   「受保护客户数据(Protected Customer Data)Level 2」访问(Shopify 审核);审核未过前 CHANNEL_MARKETING 表为空(优雅降级)。
scopes = "read_customers,write_customers,write_files,read_discounts,write_discounts,read_gift_cards,write_gift_cards,read_products,read_orders,read_reports,read_inventory,customer_read_customers"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "/proxy"
subpath = "waterdrop"
prefix = "apps"